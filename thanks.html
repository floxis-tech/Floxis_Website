<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You — Floxis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --cyan: #47EBEB;
            --purple: #8952FD;
            --gradient: linear-gradient(135deg, #47EBEB 0%, #8952FD 100%);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }
        .card {
            max-width: 520px;
        }
        .check {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--gradient);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }
        .check svg { width: 32px; height: 32px; stroke: #0a0a0f; }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 12px;
        }
        p {
            color: #999;
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        a {
            display: inline-block;
            padding: 12px 28px;
            background: var(--gradient);
            color: #0a0a0f;
            font-weight: 600;
            border-radius: 10px;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        a:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="card">
        <div class="check">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 13l4 4L19 7"/>
            </svg>
        </div>
        <h1>Thank You!</h1>
        <p>Your message has been received. Our team will get back to you at the email you provided shortly.</p>
        <a href="/">Back to Home</a>
    </div>
</body>
</html>
